{% extends "base.html" %}
{% block title %}Add Doctor - MediCare{% endblock %}
{% block page_title %}Add Doctor{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Add New Doctor</h1>
  <p>Create a doctor account. They'll login with these credentials.</p>
</div>
<div class="card" style="max-width:680px">
  <div class="card-body">
    <form method="POST">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#9ca3af;margin-bottom:14px;border-bottom:1px solid #f3f4f6;padding-bottom:8px">Personal & Professional Info</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" required placeholder="Dr. Jane Smith">
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" name="phone" class="form-control" placeholder="+91 9999999999">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Specialty</label>
        <select name="specialty" class="form-control" required>
          <option value="">Select Specialty</option>
          {% for s in ['Cardiology','Dermatology','ENT','General Medicine','Neurology','Oncology','Orthopedics','Pediatrics','Psychiatry','Radiology','Surgery','Urology'] %}
          <option value="{{ s }}">{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Qualification</label>
          <input type="text" name="qualification" class="form-control" placeholder="MBBS, MD, etc.">
        </div>
        <div class="form-group">
          <label class="form-label">Experience (years)</label>
          <input type="number" name="experience_years" class="form-control" min="0" value="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Consultation Fee (₹)</label>
        <input type="number" name="consultation_fee" class="form-control" min="0" step="0.01" value="500">
      </div>
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#9ca3af;margin:20px 0 14px;border-bottom:1px solid #f3f4f6;padding-bottom:8px">Login Credentials</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" required placeholder="doctor@hospital.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required placeholder="Min 6 characters" minlength="6">
        </div>
      </div>
      <div style="display:flex;gap:12px">
        <button type="submit" class="btn btn-primary">Add Doctor</button>
        <a href="{{ url_for('admin.doctors') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
