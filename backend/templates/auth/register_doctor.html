{% extends "base.html" %}

{% block title %}Doctor Register - MediCare{% endblock %}

{% block auth_content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8f9fc;padding:40px">

  <div class="card" style="width:100%;max-width:500px">

    <div class="card-header">
      <div class="card-title">Doctor Registration</div>
    </div>

    <div class="card-body">

      <form method="POST">

        <div class="form-group">
          <label class="form-label">Doctor Name</label>
          <input type="text" name="name" class="form-control" required>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>

        <div class="form-group">
          <label class="form-label">Specialty</label>
          <input type="text" name="specialty" class="form-control" required>
        </div>

        <div class="form-group">
          <label class="form-label">Experience</label>
          <input type="text" name="experience" class="form-control" placeholder="5 Years" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%">
          Register Doctor
        </button>

      </form>

      <div style="margin-top:18px;text-align:center">
        <a href="{{ url_for('auth.login') }}">
          Back to Login
        </a>
      </div>

    </div>
  </div>
</div>
{% endblock %}
